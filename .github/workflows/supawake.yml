name: Keep Supabase Awake

on:
  schedule:
    - cron: '0 2 */3 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Keep Supabase awake (write then delete)
        run: |
          curl -X POST "${{ secrets.SUPABASE_URL }}/rest/v1/feedback" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"optimization_suggestions": "keepalive"}'
          curl -X DELETE "${{ secrets.SUPABASE_URL }}/rest/v1/feedback?optimization_suggestions=eq.keepalive" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
